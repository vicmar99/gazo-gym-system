<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Dashboard - GAZO Fitness</title>
</head>

<body>

<h1>Dashboard GAZO Fitness</h1>

<hr>

<h2>Clientes activos:</h2>

<h3 th:text="${clientesActivos}"></h3>

<hr>

<h2>Asistencias hoy:</h2>

<h3 th:text="${asistenciasHoy}"></h3>

<hr>

<h2>Ingresos hoy:</h2>

<h3 th:text="'$' + ${ingresosHoy}"></h3>

<hr>

<h2>Ingresos del mes:</h2>

<h3 th:text="'$' + ${ingresosMes}"></h3>

<hr>

<h2>Próximos vencimientos</h2>

<table border="1">

  <tr>
    <th>Cliente</th>
    <th>Vence</th>
  </tr>

  <tr th:each="cliente : ${proximosVencimientos}">

    <td th:text="${cliente.nombre}"></td>

    <td th:text="${#temporals.format(cliente.fechaVencimiento,
                                         'dd/MM/yyyy HH:mm')}"></td>

  </tr>

</table>
<hr>

<h2>Últimos pagos registrados</h2>

<div th:if="${#lists.isEmpty(ultimosPagos)}">

  <p>No hay pagos registrados.</p>

</div>

<table
        th:unless="${#lists.isEmpty(ultimosPagos)}"
        border="1">

  <tr>
    <th>Fecha</th>
    <th>Cliente</th>
    <th>Membresía</th>
    <th>Monto</th>
    <th>Método</th>
  </tr>

  <tr th:each="pago : ${ultimosPagos}">

    <td th:text="${#temporals.format(
                pago.fechaPago,
                'dd/MM/yyyy HH:mm')}">
    </td>

    <td th:text="${pago.cliente.nombre}">
    </td>

    <td th:text="${pago.membresia.nombre}">
    </td>

    <td th:text="${'$' + pago.montoPagado}">
    </td>

    <td th:text="${pago.metodoPago}">
    </td>

  </tr>

</table>
</body>
</html>
